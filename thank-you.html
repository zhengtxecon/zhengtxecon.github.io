<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thank you for your message - Tianxiang Zheng (郑天翔)">
    <title>Thank You - Tianxiang Zheng (郑天翔)</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="assets/js/main.js" defer></script>
    <style>
        .thank-you-container {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 50px 20px;
        }
        
        .thank-you-icon {
            font-size: 5rem;
            color: var(--secondary-color);
            margin-bottom: 30px;
            animation: scaleIn 0.6s ease-out forwards;
        }
        
        .thank-you-heading {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--text-primary);
            animation: fadeUp 0.8s ease-out forwards;
        }
        
        .thank-you-message {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--text-secondary);
            max-width: 600px;
            animation: fadeUp 1s 0.2s ease-out forwards;
            opacity: 0;
        }
        
        .action-buttons {
            display: flex;
            gap: 20px;
            animation: fadeUp 1.2s 0.4s ease-out forwards;
            opacity: 0;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: var(--secondary-color);
            color: white;
        }
        
        .btn-outline {
            border: 2px solid var(--secondary-color);
            color: var(--secondary-color);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        @keyframes fadeUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @media (max-width: 576px) {
            .thank-you-heading {
                font-size: 2rem;
            }
            
            .thank-you-message {
                font-size: 1rem;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Include header using JavaScript -->
    <div id="header-placeholder"></div>
    
    <main class="thank-you-container">
        <div class="thank-you-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="thank-you-heading">Message Sent Successfully!</h1>
        <p class="thank-you-message">Thank you for reaching out. I appreciate your message and will get back to you as soon as possible. Usually, I respond within 48 hours during weekdays.</p>
        <div class="action-buttons">
            <a href="index.html" class="btn btn-outline">
                <i class="fas fa-home"></i> Return to Home
            </a>
            <a href="research.html" class="btn btn-primary">
                <i class="fas fa-flask"></i> Explore My Research
            </a>
        </div>
    </main>
    
    <!-- Include footer using JavaScript -->
    <div id="footer-placeholder"></div>
    
    <script>
        // Load header and footer
        fetch('includes/header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data);
        
        fetch('includes/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>
</body>
</html>
