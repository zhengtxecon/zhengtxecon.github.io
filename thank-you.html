<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thank you for contacting Tianxiang Zheng (郑天翔)">
    <title>Thank You - Tianxiang Zheng (郑天翔)</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="assets/js/main.js" defer></script>
    <style>
        .thank-you-container {
            text-align: center;
            padding: 80px 20px;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .thank-you-icon {
            font-size: 5rem;
            color: var(--color-primary);
            margin-bottom: 20px;
            animation: bounce 1.5s ease infinite;
        }
        
        .thank-you-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--color-text-dark);
        }
        
        .thank-you-message {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 30px;
            color: var(--color-text);
        }
        
        .thank-you-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        
        .thank-you-actions .btn {
            min-width: 180px;
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        @media (max-width: 768px) {
            .thank-you-title {
                font-size: 2rem;
            }
            
            .thank-you-message {
                font-size: 1rem;
            }
            
            .thank-you-actions .btn {
                min-width: 140px;
            }
        }
    </style>
</head>
<body>
    <!-- Include header using JavaScript -->
    <div id="header-placeholder"></div>
    
    <main class="thank-you-container">
        <div class="thank-you-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="thank-you-title">Thank You for Your Message!</h1>
        <p class="thank-you-message">
            I appreciate you taking the time to get in touch. Your message has been successfully submitted, and I will review it soon. You can expect a response within 48 hours during weekdays.
        </p>
        <div class="thank-you-actions">
            <a href="index.html" class="btn btn-secondary">
                <i class="fas fa-home"></i> Return to Homepage
            </a>
            <a href="research.html" class="btn btn-primary">
                <i class="fas fa-flask"></i> Explore My Research
            </a>
        </div>
    </main>
    
    <!-- Include footer using JavaScript -->
    <div id="footer-placeholder"></div>
    
    <script>
        // Load header and footer
        fetch('includes/header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data);
        
        fetch('includes/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>
</body>
</html>
