<form id="contact-form" class="animated-form" action="https://formsubmit.co/tianxiang.zheng.22@ucl.ac.uk" method="POST">
    <!-- FormSubmit.co configuration -->
    <input type="hidden" name="_subject" value="New Website Contact: Collaboration Request">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="https://zhengtxecon.github.io/thank-you.html">
    <!-- Add honeypot field for spam prevention -->
    <input type="text" name="_honey" style="display:none">
    
    <div class="form-group">
        <label for="name">Full Name</label>
        <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
    </div>
    
    <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="Your email address" required>
        </div>
    </div>
    
    <div class="form-group">
        <label for="contact-purpose">Purpose of Contact</label>
        <div class="input-wrapper">
            <i class="fas fa-tasks"></i>
            <select id="contact-purpose" name="purpose" required>
                <option value="" disabled selected>Select a purpose...</option>
                <option value="Research Collaboration">Research Collaboration</option>
                <option value="Speaking/Conference Invitation">Speaking/Conference Invitation</option>
                <option value="Academic Discussion">Academic Discussion</option>
                <option value="Student Inquiry">Student Inquiry</option>
                <option value="Other">Other</option>
            </select>
        </div>
    </div>
    
    <div class="form-group">
        <label for="subject">Subject</label>
        <div class="input-wrapper">
            <i class="fas fa-tag"></i>
            <input type="text" id="subject" name="subject" placeholder="Brief topic description" required>
        </div>
    </div>
    
    <div class="form-group">
        <label for="message">Proposal or Message</label>
        <div class="input-wrapper textarea-wrapper">
            <i class="fas fa-comment-alt"></i>
            <textarea id="message" name="message" rows="6" placeholder="Please describe your proposal, research interests, or how we might collaborate..." required></textarea>
        </div>
    </div>
    
    <div class="form-group form-checkbox">
        <input type="checkbox" id="consent" name="consent" value="Yes" required>
        <label for="consent">I consent to having my submitted information stored so you can respond to my inquiry.</label>
    </div>
    
    <button type="submit" class="btn btn-primary submit-btn">
        <span class="btn-text">Send Proposal</span>
        <i class="fas fa-paper-plane"></i>
    </button>
</form>
